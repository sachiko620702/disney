                        </div>

                        {/* --- 🚢 設施與【美食推薦】強制歸位 --- */}
                        {activeTab === 'dining' && (
                            <div className="space-y-6 animate-in fade-in pb-10">
                                {/* 🔴 推薦必吃 (紅榜) */}
                                <section className="bg-white text-slate-900 rounded-[2rem] p-7 shadow-md font-black border border-slate-200">
                                    <h4 className="text-blue-700 font-title mb-6 flex items-center gap-2"><i data-lucide="utensils" /> 下船群友激推必吃</h4>
                                    <div className="space-y-6">
                                        <div>
                                            <p className="food-header">主餐廳與精緻餐飲</p>
                                            <div className="flex flex-wrap gap-2">
                                                <span className="rec-tag">牛排/魚排/干貝</span>
                                                <span className="rec-tag">Navigator 鮭魚/蝦子</span>
                                                <span className="rec-tag">脆皮叉燒</span>
                                            </div>
                                        </div>
                                        <div>
                                            <p className="food-header">快餐、甲板與甜點</p>
                                            <div className="flex flex-wrap gap-2">
                                                <span className="rec-tag">漢堡/熱狗 (必加泡菜)</span>
                                                <span className="rec-tag">18F 雞肉熱狗</span>
                                                <span className="rec-tag">史迪奇牛肉熱狗</span>
                                                <span className="rec-tag">炸薯條</span>
                                                <span className="rec-tag">17F 霜淇淋/Pizza</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                            <p className="text-blue-700 font-small underline mb-2">蔬菜與自助餐推薦：</p>
                                            <p className="text-slate-700 font-main">節瓜、炒芥藍、炒蘑菇、優格</p>
                                        </div>
                                    </div>
                                </section>

                                {/* 禮賓供餐時段 */}
                                <section className="bg-white text-slate-900 rounded-[2rem] p-7 shadow-md border border-slate-200 font-black">
                                    <h4 className="text-blue-700 font-title mb-6 flex items-center gap-2 font-black font-black font-black"><i data-lucide="clock" /> 禮賓專屬供餐 (17F 酒廊)</h4>
                                    <div className="space-y-5 font-main">
                                        <div className="flex justify-between border-b border-slate-100 pb-2"><span>活力早餐 (含點餐)</span><span className="text-blue-600">07:00 – 10:30</span></div>
                                        <div className="flex justify-between border-b border-slate-100 pb-2"><span>精緻午餐 (含點餐)</span><span className="text-blue-600">11:00 – 14:30</span></div>
                                        <div className="flex justify-between border-b border-slate-100 pb-2"><span>悠閒下午茶</span><span className="text-blue-600">15:00 – 16:30</span></div>
                                        <div className="flex justify-between border-b border-slate-100 pb-2 text-amber-600 font-black font-black font-black"><span>酒水暢飲時段</span><span>17:00 – 22:00</span></div>
                                        <div className="flex justify-between"><span>宵夜甜點時光</span><span className="text-amber-600">20:30 – 22:00</span></div>
                                    </div>
                                </section>

                                {/* 設施指南 */}
                                <section className="bg-white rounded-3xl p-6 shadow-md border font-black">
                                    <h4 className="font-title text-slate-900 mb-5 border-b-2 border-blue-500 pb-2">19F-5F 樓層設施指南</h4>
                                    {floorData.map((f, idx) => (
                                        <div key={idx} className="mb-4 last:mb-0 border-b border-slate-100 pb-4">
                                            <span className="bg-blue-600 text-white font-small px-3 py-1 rounded-lg inline-block mb-3">{f.deck}</span>
                                            {f.items.map((item, i) => (<p key={i} className="text-slate-900 font-main pl-2">• {item.n} ({item.p})</p>))}
                                        </div>
                                    ))}
                                </section>
                            </div>
                        )}

                        {/* --- 📸 拍照內容 (抓回) --- */}
                        {activeTab === 'photo' && (
                            <div className="space-y-6 animate-in fade-in pb-10">
                                {photoSpots.map((p, idx) => (
                                    <div key={idx} className="bg-white rounded-3xl p-6 shadow-md border border-purple-100">
                                        <span className="bg-purple-600 text-white font-small px-3 py-1 rounded-lg inline-block mb-4 font-black">{p.deck}</span>
                                        <div className="space-y-4 font-black">
                                            {p.items.map((item, i) => (<div key={i} className="photo-card font-black"><p className="font-main font-black font-black">{item.n}</p><p className="font-small text-blue-600 font-black font-black font-black font-black">📍 {item.l}</p></div>))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- 🏆 攻略與教戰 (抓回) --- */}
                        {activeTab === 'tips' && (
                            <div className="space-y-6 animate-in fade-in pb-10">
                                <div className="bg-white text-slate-900 rounded-[2rem] p-7 shadow-md border border-slate-200">
                                    <h4 className="text-blue-700 font-title mb-4 flex items-center gap-2"><i data-lucide="popcorn" /> 🍿 禮賓爆米花領取</h4>
                                    <p className="font-main font-black font-black font-black font-black font-black">演出前 40 分鐘前往 5F 船頭 (Walt Disney Theatre) 找禮賓人員領取。</p>
                                </div>
                                <section className="bg-white text-slate-900 rounded-[2rem] p-7 shadow-md border border-slate-200 font-black font-black font-black">
                                    <h4 className="text-blue-700 font-title mb-4 font-black font-black font-black font-black font-black">🏆 航行教戰守則</h4>
                                    <div className="space-y-4 font-main font-black">
                                        <p>• Day 1-3 16:00 準時搶預約！</p>
                                        <p>• 給服務員 $10 小費可換熱情積極服務。</p>
                                        <p>• 點餐建議「一次點齊」，避免久候。</p>
                                        <p className="text-red-600 underline decoration-red-500 font-black">• 務必餐前洗手！醫務室費用一次 $300 起。</p>
                                    </div>
                                </section>
                                <section className="bg-white text-slate-900 rounded-[2rem] p-7 shadow-md border border-slate-200">
                                    <h4 className="text-blue-700 font-title mb-4 font-black">📸 拍照與 Magic Shot Tips</h4>

                                    <div className="space-y-4 font-main font-black">
                                        <p>• Magic Shot 不一定每天、每個地點都有；看到 PhotoPass 攝影師時可以直接問：「Do you have any Magic Shots here？」</p>

                                        <p>• 建議白天拍戶外：Toy Story Place、Marvel Landing、Wayfinder Bay；晚上拍室內與燈光區：Discovery Reef、Imagination Garden、Town Square。</p>

                                        <p>• Immersive Portraits / Lifestyle Portraits 建議穿比較完整的造型去拍，效果會比臨時路過更好。</p>

                                        <p>• 拍照前先整理房卡、掛繩、手環、包包位置；Magic Shot 常需要擺手勢，畫面越乾淨越好看。</p>
                                    </div>
                                </section>
                                <section className="bg-white text-slate-900 rounded-[2rem] p-7 shadow-md border border-slate-200">
                                    <h4 className="text-blue-700 font-title mb-4 font-black">🍽️ 餐廳與點餐 Tips</h4>

                                    <div className="space-y-4 font-main font-black">
                                        <p>• 第一晚就告訴服務員：不吃的食材、過敏、想喝的飲料、喜歡熱茶或冰水、甜點偏好。</p>

                                        <p>• 想拍餐廳空景，建議在入座後、人潮還沒完全進來前快速拍；不要等到上菜後才拍全景。</p>

                                        <p>• Palo / Mike & Sulley’s 這類 Premium Dining 建議提早抵達，入口、酒吧與窗邊區域通常都很好拍。</p>

                                        <p>• 若主餐猶豫，可以禮貌詢問服務員推薦；DCL 晚餐通常可以多點前菜或甜點，但仍建議適量避免浪費。</p>
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'itinerary' && (
                            <div className="space-y-4 animate-in fade-in pb-10 font-black font-black">
                                {itinerary.map((day, i) => (
                                    <div key={i} className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 font-black font-black font-black font-black">
                                        <div className="flex items-center gap-2 mb-3 border-b pb-2"><span className="text-blue-600 font-title">{day.d}</span><span className="text-slate-800 font-title font-black">{day.t}</span></div>
                                        <div className="space-y-4 ml-1 border-l-2 border-blue-100 pl-4">
                                            {day.items.map((ev, j) => (<div key={j} className="font-black font-black"><p className="font-small text-slate-400">{ev.time}</p><p className={`font-main ${ev.color || 'text-slate-800'}`}>{ev.act}</p>{ev.loc && <p className="font-small text-blue-600 font-black">📍 {ev.loc}</p>}</div>))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        {activeTab === 'menu' && (
                            <div className="space-y-4 animate-in fade-in pb-10">
                                <section className="bg-white rounded-3xl p-4 shadow-md border border-slate-200">
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        {menuRootTabs.map(tab => (
                                            <button
                                                key={tab.id}
                                                onClick={() => {
                                                    setMenuRootTab(tab.id);
                                                    setMenuQuery('');
                                                    if (tab.id === 'sulley') setMenuSubTab('sulley-steak');
                                                    if (tab.id === 'palo') setMenuSubTab('palo-brunch');
                                                }}
                                                className={`px-3 py-2 rounded-xl text-xs border font-black ${menuRootTab === tab.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200'}`}
                                            >
                                                {tab.label}
                                            </button>
                                        ))}
                                    </div>

                                    {(menuRootTab === 'sulley' || menuRootTab === 'palo') && (
                                        <div className="flex gap-2 overflow-x-auto pb-1 mb-3">
                                            {menuSubTabs[menuRootTab].map(tab => (
                                                <button
                                                    key={tab.id}
                                                    onClick={() => setMenuSubTab(tab.id)}
                                                    className={`shrink-0 px-3 py-2 rounded-xl text-xs border font-black ${menuSubTab === tab.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200'}`}
                                                >
                                                    {tab.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    <input
                                        value={menuQuery}
                                        onChange={(e) => setMenuQuery(e.target.value)}
                                        placeholder="搜尋中文、英文或描述"
                                        className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 font-black text-sm"
                                    />
                                </section>

                                <section className="bg-white rounded-3xl p-4 shadow-md border border-slate-200">
                                    <div className="flex items-center justify-between mb-2">
                                        <h3 className="text-slate-900 text-sm">資料檢查器</h3>
                                        <span className={`text-[10px] px-2 py-1 rounded-lg ${coverageReport.ok ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                                            {coverageReport.ok ? '完整' : '待補'}
                                        </span>
                                    </div>
                                    <p className="text-xs text-slate-500">項目 {coverageReport.totalItems} 筆 / 餐廳 {coverageReport.restaurantsCount} 個</p>
                                    {coverageReport.missingRestaurants.length > 0 && (
                                        <p className="text-xs text-red-600 mt-2">缺餐廳：{coverageReport.missingRestaurants.join(', ')}</p>
                                    )}
                                    {coverageReport.missingCategories.length > 0 && (
                                        <p className="text-xs text-amber-700 mt-1">
                                            缺類別：{coverageReport.missingCategories.slice(0, 6).map(x => `${x.restaurant}/${x.category}`).join(', ')}
                                            {coverageReport.missingCategories.length > 6 ? ` ...共 ${coverageReport.missingCategories.length} 項` : ''}
                                        </p>
                                    )}
                                </section>

                                {visibleMenuItems.length === 0 && (
                                    <section className="bg-white rounded-3xl p-6 shadow-md border border-slate-200 text-center text-slate-500">
                                        目前此區還沒有資料，下一步會分批補上。
                                    </section>
                                )}

                                {sortedCategories.map(category => (
                                    <section key={category} className="bg-white rounded-3xl p-4 shadow-md border border-slate-200">
                                        <h3 className="text-slate-900 text-base border-l-4 border-blue-600 pl-3 mb-3">
                                            {categoryLabels[category] || category}
                                        </h3>
                                        <div className="space-y-3">
                                            {groupedItems[category].map((item, idx) => (
                                                <article key={`${item.restaurant}-${item.name_en}-${idx}`} className="bg-white rounded-xl p-4 border border-slate-200">
                                                    <div className="flex items-start justify-between gap-2">
                                                        <div>
                                                            <p className="text-slate-900 text-sm">{item.name_zh}</p>
                                                            <p className="text-slate-500 text-xs italic">{item.name_en}</p>
                                                        </div>
                                                        {item.price && (
                                                            <span className="text-blue-600 text-xs whitespace-nowrap">{item.price}</span>
                                                        )}
                                                    </div>
                                                    {item.desc && (
                                                        <p className="text-slate-500 text-xs mt-2 leading-relaxed">{item.desc}</p>
                                                    )}
                                                    {item.tag && (
                                                        <div className="mt-2 flex flex-wrap gap-1.5">
                                                            {parseTagTokens(item.tag).map((token) => (
                                                                <span
                                                                    key={`${item.name_en}-${token}`}
                                                                    className={`inline-flex px-2 py-1 rounded-lg text-[10px] font-black ${tagClass(token)}`}
                                                                >
                                                                    {getFriendlyTagLabel(token)}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    )}
                                                </article>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-0 inset-x-0 h-20 bg-white/95 backdrop-blur-md flex items-center justify-around z-50 shadow-2xl border-t pb-2 font-black font-black font-black font-black">
                        {['itinerary', 'photo', 'dining', 'tips', 'menu'].map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex flex-col items-center gap-1 ${activeTab === tab ? 'text-blue-600 scale-110' : 'text-slate-400'} font-black font-black font-black`}>
                                <i data-lucide={tab === 'itinerary' ? 'calendar' : tab === 'photo' ? 'camera' : tab === 'dining' ? 'utensils' : tab === 'tips' ? 'zap' : 'languages'} size={24}/>
                                <span className="text-[10px] font-black">{tab === 'itinerary' ? '行程' : tab === 'photo' ? '拍照' : tab === 'dining' ? '設施' : tab === 'tips' ? '攻略' : '菜單'}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
